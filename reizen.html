<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reizen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #020617; color: #f1f5f9; min-height: 100vh; scroll-behavior: smooth; }
        .glass-card { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .input-dark { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; padding: 12px; width: 100%; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; font-weight: 800; border-radius: 12px; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4); }
        .stat-card { background: linear-gradient(180deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0) 100%); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 20px; text-align: center; }
        .sync-badge { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); padding: 4px 12px; border-radius: 99px; font-size: 10px; font-weight: 700; }
        
        #input-sectie {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out, opacity 0.5s;
            opacity: 0;
        }
        #input-sectie.visible {
            max-height: 1000px;
            opacity: 1;
            margin-bottom: 2.5rem;
        }

        #drop-zone.drag-over {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            transform: scale(1.02);
        }
    </style>
</head>
<body class="pb-12">

    <nav class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md border-b border-white/5 px-8 py-5 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fas fa-ship text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-black uppercase tracking-tight text-white">MS New Mexico</h1>
                <span class="sync-badge" id="sync-text">Cloud Verbonden</span>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="maakPDF()" class="w-10 h-10 bg-red-500/10 border border-red-500/20 text-red-500 rounded-xl flex items-center justify-center hover:bg-red-500 hover:text-white transition-all shadow-lg" title="Exporteer Rapport">
                <i class="fas fa-file-pdf"></i>
            </button>

            <button onclick="toggleInvoer()" class="flex items-center gap-2 bg-emerald-500 text-white px-4 py-2 rounded-xl font-bold text-sm shadow-lg shadow-emerald-500/20 hover:scale-105 transition-transform">
                <i class="fas fa-plus"></i>
                <span class="hidden md:inline">Nieuwe Reis</span>
            </button>
            
            <select id="filter-jaar" onchange="laadDataVanCloud()" class="bg-slate-900 border border-white/10 rounded-lg px-3 py-1 text-xs font-bold text-white outline-none">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
            </select>
            <button onclick="laadDataVanCloud()" class="text-slate-400 hover:text-white transition-colors px-2">
                <i class="fas fa-sync-alt" id="refresh-icon"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 mt-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="stat-card">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Totaal Reizen (<span id="stats-jaar">2026</span>)</p>
                <h2 id="stat-reizen" class="text-4xl font-black text-white">0</h2>
            </div>
            <div class="stat-card">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Containers</p>
                <h2 id="stat-containers" class="text-4xl font-black text-blue-500">0</h2>
            </div>
            <div class="stat-card">
                <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Totaal Tonnage</p>
                <h2 id="stat-tonnage" class="text-4xl font-black text-emerald-500">0.0</h2>
            </div>
        </div>

        <div id="input-sectie" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass-card p-8 border-blue-500/20">
                <h3 class="font-bold mb-6 text-white text-sm tracking-widest uppercase">Handmatige Invoer</h3>
                <form onsubmit="verwerkInvoer(event)" class="space-y-4">
<div class="grid grid-cols-3 gap-4">
    <div class="col-span-2">
        <input type="text" id="reis-nr" class="input-dark" placeholder="Reisnummer" required>
    </div>
    <div>
        <input type="number" id="reis-laag-handmatig" class="input-dark" placeholder="Lagen">
    </div>
</div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="reis-kisten" class="input-dark" placeholder="Containers" required>
                        <input type="number" step="0.01" id="reis-ton" class="input-dark" placeholder="Ton" required>
                    </div>
                    <button type="submit" class="btn-primary w-full py-4 uppercase text-xs tracking-widest">Opslaan</button>
                </form>
            </div>

            <div class="glass-card p-8 border-emerald-500/20 flex flex-col justify-center">
                <h3 class="font-bold mb-6 text-white text-sm tracking-widest uppercase text-center">BAPLIE Automatische Analyse</h3>
                <div class="space-y-4">
                    <div id="drop-zone" class="border-2 border-dashed border-white/10 rounded-xl p-10 text-center hover:border-emerald-500/50 transition-all bg-white/[0.02] cursor-pointer">
                        <input type="file" id="baplie-file" class="hidden" onchange="analyseerBaplie(event)">
                        <label for="baplie-file" class="cursor-pointer block">
                            <i class="fas fa-file-invoice text-4xl text-emerald-500 mb-4"></i>
                            <p class="text-sm text-white font-bold mb-1">Sleep BAPLIE hierheen</p>
                            <p class="text-[10px] text-slate-500 uppercase tracking-widest">Of klik om te selecteren</p>
                        </label>
                    </div>
                    <p id="baplie-status" class="text-[10px] font-bold text-center uppercase tracking-widest h-10"></p>
                </div>
            </div>
        </div>

        <div class="glass-card overflow-hidden">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-[10px] text-slate-500 uppercase bg-slate-950/50">
                        <th class="px-8 py-4">Datum</th>
                        <th class="px-8 py-4">Reisnummer</th>
                        <th class="px-8 py-4 text-right">Containers</th>
                        <th class="px-8 py-4 text-right">Lagen</th>
                        <th class="px-8 py-4 text-right">Tonnage</th>
                    </tr>
                </thead>
                <tbody id="reis-lijst-body" class="divide-y divide-white/5 text-sm"></tbody>
            </table>
        </div>
    </main>

<script>
// --- CONFIGURATION ---
const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxyQcd_3MFnDBXu09l-UTT1gfw2Se4LlF7fXvNivmPW5zN29Wd0nyv66krUhlBl6EKF9A/exec';
let actueleData = [];

// --- 1. LOAD DATA ON START ---
async function laadDataVanCloud() {
    const syncText = document.getElementById('sync-text');
    const icon = document.getElementById('refresh-icon');
    if(icon) icon.classList.add('fa-spin');

    try {
        const response = await fetch(GOOGLE_SCRIPT_URL);
        const data = await response.json();
        
        const jaar = document.getElementById('filter-jaar').value;
        actueleData = data.filter(r => {
            if (!r.datum) return false;
            return new Date(r.datum).getFullYear().toString() === jaar || r.datum.includes(jaar);
        });

        actueleData.sort((a, b) => new Date(b.datum) - new Date(a.datum));
        renderLijst(actueleData);
        updateStats(actueleData);
        
        if(syncText) syncText.innerText = "Cloud Verbonden";
    } catch (err) {
        console.error("Fout bij laden:", err);
        if(syncText) syncText.innerText = "Laden mislukt";
    } finally {
        if(icon) icon.classList.remove('fa-spin');
    }
}

// --- 2. BAPLIE ANALYZER (Merges with manual input) ---
function analyseerBaplie(e) {
    const file = e.target.files ? e.target.files[0] : e.dataTransfer.files[0];
    if (!file) return;

    const status = document.getElementById('baplie-status');
    if(status) status.innerText = "Bezig met automatisch verwerken...";
    
    const reader = new FileReader();
    // We maken de functie 'async' om direct te kunnen verzenden
    reader.onload = async function(event) {
        try {
            const text = event.target.result;
            const segments = text.split("'");
            let gevondenNr = "", bKisten = 0, bTon = 0, maxL = 0;

            segments.forEach(seg => {
                const line = seg.trim();
                if (line.startsWith('TDT+20+')) gevondenNr = line.split('+')[2].split(':')[0];
                if (line.startsWith('LOC+147')) {
                    bKisten++;
                    const pos = line.split('+')[2].split(':')[0];
                    const l = parseInt(pos.slice(-2));
                    if (l > maxL) maxL = l;
                }
                if (line.includes('KGM:')) {
                    const w = parseFloat(line.split('KGM:')[1].split('+')[0]);
                    if (!isNaN(w)) bTon += (w / 1000);
                }
            });

            // 1. Haal de handmatige waarden op die er al stonden
            const hKisten = parseInt(document.getElementById('reis-kisten').value) || 0;
            const hTon = parseFloat(document.getElementById('reis-ton').value) || 0;
            const hLaag = document.getElementById('reis-laag-handmatig').value;

            // 2. Bereken de nieuwe totalen
            const totaalKisten = hKisten + bKisten;
            const totaalTonnage = (hTon + bTon).toFixed(1);
            // Als er handmatig geen laag was ingevuld, pak die uit de BAPLIE
            const finaleLaag = hLaag || Math.ceil(maxL / 2);

            // 3. Update de vakjes op het scherm (visuele feedback)
            document.getElementById('reis-nr').value = gevondenNr;
            document.getElementById('reis-kisten').value = totaalKisten;
            document.getElementById('reis-ton').value = totaalTonnage;
            document.getElementById('reis-laag-handmatig').value = finaleLaag;

            // --- 4. AUTOMATISCH VERSTUREN ---
            // We sturen de gecombineerde data direct naar de cloud
            await verzendData(gevondenNr, totaalKisten, totaalTonnage, finaleLaag);
            
            if(status) status.innerHTML = "<span style='color: #10b981;'>✓ Automatisch samengevoegd & opgeslagen!</span>";
            
            // Optioneel: Maak de form leeg na een paar seconden
            setTimeout(() => {
                document.getElementById('reis-nr').value = "";
                document.getElementById('reis-kisten').value = "";
                document.getElementById('reis-ton').value = "";
                document.getElementById('reis-laag-handmatig').value = "";
            }, 3000);

        } catch (err) {
            console.error(err);
            if(status) status.innerText = "Fout bij automatisch verzenden.";
        }
    };
    reader.readAsText(file);
}
// --- 3. SAVE FUNCTION ---
async function verwerkInvoer(e) {
    e.preventDefault();
    const nr = document.getElementById('reis-nr').value;
    const kisten = document.getElementById('reis-kisten').value;
    const ton = document.getElementById('reis-ton').value;
    const laag = document.getElementById('reis-laag-handmatig').value || "-";
    
    await verzendData(nr, kisten, ton, laag);
    
    document.getElementById('reis-laag-handmatig').value = "";
    e.target.reset();
}

// --- 4. SEND TO CLOUD ---
async function verzendData(nr, containers, tonnage, laag) {
    const syncText = document.getElementById('sync-text');
    if(syncText) syncText.innerText = "Opslaan...";

    const datum = new Date().toISOString();
    const params = new URLSearchParams({ datum, nr, containers, tonnage, laag });
    const url = `${GOOGLE_SCRIPT_URL}?${params.toString()}`;

    try {
        await fetch(url, { method: 'GET', mode: 'no-cors' });

        const nieuweReis = { datum, nr, containers, tonnage, laag };
        actueleData.unshift(nieuweReis);

        renderLijst(actueleData);
        updateStats(actueleData);

        if(syncText) syncText.innerText = "Opgeslagen ✓";
        setTimeout(laadDataVanCloud, 1500);

        setTimeout(() => {
            document.getElementById('baplie-status').innerHTML = "";
        }, 3000);

    } catch (err) {
        console.error("Opslaan fout:", err);
        if(syncText) syncText.innerText = "Fout bij opslaan";
    }
}

// --- 5. UI DISPLAY ---
function formatteerDatum(datumStr) {
    if (!datumStr) return "-";
    const d = new Date(datumStr);
    return d.toLocaleDateString('nl-NL');
}

function renderLijst(reizen) {
    const body = document.getElementById('reis-lijst-body');
    if(!body) return;
    
    body.innerHTML = reizen.map(r => `
        <tr class="hover:bg-white/[0.02] border-b border-white/5 transition-colors">
            <td class="px-8 py-4 text-slate-500">${formatteerDatum(r.datum)}</td>
            <td class="px-8 py-4 font-bold text-white">${r.nr}</td>
            <td class="px-8 py-4 text-right font-bold text-blue-400">${r.containers}</td>
            <td class="px-8 py-4 text-right font-bold text-slate-400">${r.laag || '-'}</td>
            <td class="px-8 py-4 text-right font-bold text-emerald-500">${parseFloat(r.tonnage).toLocaleString('nl-NL')} T</td>
        </tr>
    `).join('');
}

function updateStats(reizen) {
    document.getElementById('stat-reizen').innerText = reizen.length;
    document.getElementById('stat-containers').innerText = reizen.reduce((s, r) => s + (parseInt(r.containers) || 0), 0);
    document.getElementById('stat-tonnage').innerText = reizen.reduce((s, r) => s + (parseFloat(r.tonnage) || 0), 0).toFixed(1);
    const sj = document.getElementById('stats-jaar');
    if(sj) sj.innerText = document.getElementById('filter-jaar').value;
}

// --- 6. INITIALIZATION & EVENTS ---
const dz = document.getElementById('drop-zone');
if(dz) {
    dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('border-blue-500'); });
    dz.addEventListener('dragleave', () => { dz.classList.remove('border-blue-500'); });
    dz.addEventListener('drop', (e) => {
        e.preventDefault();
        dz.classList.remove('border-blue-500');
        analyseerBaplie(e);
    });
}

function toggleInvoer() {
    document.getElementById('input-sectie').classList.toggle('visible');
}

window.onload = laadDataVanCloud;

        pdf.setFillColor(14, 165, 233);
